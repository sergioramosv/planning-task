services:
  # Development service with watch polling
  planning-task:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: planning-task
    ports:
      - "3300:3300"
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=100
      # Firebase environment variables (add from .env.local)
      - NEXT_PUBLIC_FIREBASE_API_KEY=${NEXT_PUBLIC_FIREBASE_API_KEY}
      - NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}
      - NEXT_PUBLIC_FIREBASE_DATABASE_URL=${NEXT_PUBLIC_FIREBASE_DATABASE_URL}
      - NEXT_PUBLIC_FIREBASE_PROJECT_ID=${NEXT_PUBLIC_FIREBASE_PROJECT_ID}
      - NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}
      - NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}
      - NEXT_PUBLIC_FIREBASE_APP_ID=${NEXT_PUBLIC_FIREBASE_APP_ID}
      # Komodo Dashboard
      - NEXT_PUBLIC_KOMODO_WS_URL=${NEXT_PUBLIC_KOMODO_WS_URL:-ws://localhost:3001}
      - KOMODO_CONFIG_PATH=${KOMODO_CONFIG_PATH:-}
      - KOMODO_MEMORY_PATH=${KOMODO_MEMORY_PATH:-}
    volumes:
      # Mount the entire project directory
      - .:/app
      # Exclude node_modules to use container's version
      - /app/node_modules
      # Exclude .next build cache
      - /app/.next
    networks:
      - scrum-network
    stdin_open: true
    tty: true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3300"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

networks:
  scrum-network:
    driver: bridge

volumes:
  node_modules:
  next_cache:
