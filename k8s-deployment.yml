apiVersion: apps/v1
kind: Deployment
metadata:
  name: scrum-task-manager
  namespace: default
  labels:
    app: scrum-task-manager
    version: v1
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app: scrum-task-manager
  template:
    metadata:
      labels:
        app: scrum-task-manager
        version: v1
    spec:
      containers:
      - name: scrum-task-manager
        image: scrum-task-manager:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 3300
          protocol: TCP

        # Environment variables from ConfigMap and Secrets
        env:
        - name: NODE_ENV
          value: "production"
        - name: NEXT_PUBLIC_FIREBASE_API_KEY
          valueFrom:
            secretKeyRef:
              name: firebase-credentials
              key: api-key
        - name: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
          valueFrom:
            secretKeyRef:
              name: firebase-credentials
              key: auth-domain
        - name: NEXT_PUBLIC_FIREBASE_DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: firebase-credentials
              key: database-url
        - name: NEXT_PUBLIC_FIREBASE_PROJECT_ID
          valueFrom:
            secretKeyRef:
              name: firebase-credentials
              key: project-id
        - name: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
          valueFrom:
            secretKeyRef:
              name: firebase-credentials
              key: storage-bucket
        - name: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
          valueFrom:
            secretKeyRef:
              name: firebase-credentials
              key: messaging-sender-id
        - name: NEXT_PUBLIC_FIREBASE_APP_ID
          valueFrom:
            secretKeyRef:
              name: firebase-credentials
              key: app-id

        # Resource limits and requests
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"

        # Health checks
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2

        # Security context
        securityContext:
          runAsNonRoot: true
          runAsUser: 1001
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL

        # Volume mounts
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: next-cache
          mountPath: /app/.next

      # Pod security context
      securityContext:
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault

      # Volumes
      volumes:
      - name: tmp
        emptyDir: {}
      - name: next-cache
        emptyDir: {}

      # Restart policy
      restartPolicy: Always

      # Termination grace period
      terminationGracePeriodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: scrum-task-manager
  namespace: default
  labels:
    app: scrum-task-manager
spec:
  type: LoadBalancer
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
  selector:
    app: scrum-task-manager

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: scrum-task-manager-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: scrum-task-manager
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: scrum-task-manager-config
  namespace: default
data:
  NODE_ENV: "production"

---
apiVersion: v1
kind: Secret
metadata:
  name: firebase-credentials
  namespace: default
type: Opaque
stringData:
  api-key: "YOUR_API_KEY_HERE"
  auth-domain: "YOUR_DOMAIN_HERE"
  database-url: "YOUR_DATABASE_URL_HERE"
  project-id: "YOUR_PROJECT_ID_HERE"
  storage-bucket: "YOUR_STORAGE_BUCKET_HERE"
  messaging-sender-id: "YOUR_MESSAGING_SENDER_ID_HERE"
  app-id: "YOUR_APP_ID_HERE"
