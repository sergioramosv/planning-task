services:
  # Development service with explicit file watching
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: scrum-app-watch
    ports:
      - "3300:3300"
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=100
      - DEBUG=*
      # Firebase environment variables
      - NEXT_PUBLIC_FIREBASE_API_KEY=${NEXT_PUBLIC_FIREBASE_API_KEY}
      - NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}
      - NEXT_PUBLIC_FIREBASE_DATABASE_URL=${NEXT_PUBLIC_FIREBASE_DATABASE_URL}
      - NEXT_PUBLIC_FIREBASE_PROJECT_ID=${NEXT_PUBLIC_FIREBASE_PROJECT_ID}
      - NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}
      - NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}
      - NEXT_PUBLIC_FIREBASE_APP_ID=${NEXT_PUBLIC_FIREBASE_APP_ID}
    volumes:
      # Watch specific directories for changes
      - ./app:/app/app
      - ./components:/app/components
      - ./hooks:/app/hooks
      - ./lib:/app/lib
      - ./types:/app/types
      - ./public:/app/public
      - ./middleware.ts:/app/middleware.ts
      - ./next.config.js:/app/next.config.js
      - ./tsconfig.json:/app/tsconfig.json
      - ./tailwind.config.ts:/app/tailwind.config.ts
      - ./postcss.config.js:/app/postcss.config.js
      # Exclude node_modules and build cache
      - /app/node_modules
      - /app/.next
    networks:
      - scrum-network
    stdin_open: true
    tty: true
    restart: unless-stopped
    profiles:
      - watch
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3300"]
      interval: 5s
      timeout: 2s
      retries: 5
      start_period: 15s

networks:
  scrum-network:
    driver: bridge
